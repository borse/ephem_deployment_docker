<svg width="100%" viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ePHEM setup.sh — three-mode decision flow</title>
  <desc>Flowchart showing how setup.sh branches into Server Deploy, Demo, and Developer modes</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; }
      .label-main { font-size: 13px; font-weight: 600; fill: #2C2C2A; }
      .label-sub  { font-size: 11px; font-weight: 400; fill: #5F5E5A; }
      .label-step { font-size: 11px; font-weight: 400; fill: #5F5E5A; }
      .branch-num { font-size: 12px; font-weight: 600; fill: #888780; }

      /* start box */
      .box-start  { fill: #F1EFE8; stroke: #B4B2A9; stroke-width: 0.8; }

      /* mode headers */
      .box-mode1  { fill: #E1F5EE; stroke: #1D9E75; stroke-width: 0.8; }
      .box-mode2  { fill: #FAEEDA; stroke: #BA7517; stroke-width: 0.8; }
      .box-mode3  { fill: #FAECE7; stroke: #D85A30; stroke-width: 0.8; }

      /* step boxes — slightly lighter */
      .box-step1  { fill: #F0FAF6; stroke: #5DCAA5; stroke-width: 0.6; }
      .box-step2  { fill: #FEF8EE; stroke: #EF9F27; stroke-width: 0.6; }
      .box-step3  { fill: #FDF4F0; stroke: #F0997B; stroke-width: 0.6; }

      /* outcome boxes */
      .box-out1   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 1; }
      .box-out2   { fill: #FAEEDA; stroke: #854F0B; stroke-width: 1; }
      .box-out3   { fill: #FAECE7; stroke: #993C1D; stroke-width: 1; }

      /* outcome text */
      .label-out  { font-size: 12px; font-weight: 700; }
      .label-out1 { fill: #085041; }
      .label-out2 { fill: #633806; }
      .label-out3 { fill: #4A1B0C; }
      .label-outsub { font-size: 10px; font-weight: 400; }
      .label-outsub1 { fill: #0F6E56; }
      .label-outsub2 { fill: #854F0B; }
      .label-outsub3 { fill: #993C1D; }

      .conn { stroke: #B4B2A9; stroke-width: 0.8; fill: none; }
    </style>
  </defs>

  <!-- Start -->
  <rect class="box-start" x="240" y="18" width="200" height="38" rx="19"/>
  <text class="label-main" x="340" y="41" text-anchor="middle">bash setup.sh</text>

  <line class="conn" x1="340" y1="56" x2="340" y2="88" marker-end="url(#arrow)"/>

  <!-- Mode picker -->
  <rect class="box-start" x="160" y="88" width="360" height="52" rx="8"/>
  <text class="label-main" x="340" y="108" text-anchor="middle">Who are you?</text>
  <text class="label-sub"  x="340" y="128" text-anchor="middle">1 = Server deploy  ·  2 = Demo  ·  3 = Developer</text>

  <!-- Branch lines -->
  <line class="conn" x1="230" y1="140" x2="115" y2="190" marker-end="url(#arrow)"/>
  <line class="conn" x1="340" y1="140" x2="340" y2="190" marker-end="url(#arrow)"/>
  <line class="conn" x1="450" y1="140" x2="568" y2="190" marker-end="url(#arrow)"/>

  <text class="branch-num" x="162" y="175" text-anchor="middle">1</text>
  <text class="branch-num" x="340" y="183" text-anchor="middle">2</text>
  <text class="branch-num" x="520" y="175" text-anchor="middle">3</text>

  <!-- ── Mode boxes ───────────────────── -->
  <rect class="box-mode1" x="18"  y="190" width="192" height="52" rx="8"/>
  <text class="label-main" style="fill:#085041;" x="114" y="210" text-anchor="middle">Server deploy</text>
  <text class="label-sub"  x="114" y="228" text-anchor="middle">Production / staging</text>

  <rect class="box-mode2" x="244" y="190" width="192" height="52" rx="8"/>
  <text class="label-main" style="fill:#633806;" x="340" y="210" text-anchor="middle">Demo / Evaluate</text>
  <text class="label-sub"  x="340" y="228" text-anchor="middle">Localhost, no SSL</text>

  <rect class="box-mode3" x="470" y="190" width="192" height="52" rx="8"/>
  <text class="label-main" style="fill:#4A1B0C;" x="566" y="210" text-anchor="middle">Developer</text>
  <text class="label-sub"  x="566" y="228" text-anchor="middle">Collaborator, local dev</text>

  <line class="conn" x1="114" y1="242" x2="114" y2="282" marker-end="url(#arrow)"/>
  <line class="conn" x1="340" y1="242" x2="340" y2="282" marker-end="url(#arrow)"/>
  <line class="conn" x1="566" y1="242" x2="566" y2="282" marker-end="url(#arrow)"/>

  <!-- ── Step boxes ───────────────────── -->
  <rect class="box-step1" x="18"  y="282" width="192" height="74" rx="6"/>
  <text class="label-step" x="114" y="300" text-anchor="middle">Generate deploy key</text>
  <text class="label-step" x="114" y="317" text-anchor="middle">Email key → ePHEM team</text>
  <text class="label-step" x="114" y="334" text-anchor="middle">Set domain + passwords</text>
  <text class="label-step" x="114" y="351" text-anchor="middle">Configure nginx</text>

  <rect class="box-step2" x="244" y="282" width="192" height="74" rx="6"/>
  <text class="label-step" x="340" y="300" text-anchor="middle">Generate deploy key</text>
  <text class="label-step" x="340" y="317" text-anchor="middle">Email key → ePHEM team</text>
  <text class="label-step" x="340" y="334" text-anchor="middle">Auto-set passwords</text>
  <text class="label-step" x="340" y="351" text-anchor="middle">No domain needed</text>

  <rect class="box-step3" x="470" y="282" width="192" height="74" rx="6"/>
  <text class="label-step" x="566" y="300" text-anchor="middle">Verify SSH → GitHub</text>
  <text class="label-step" x="566" y="317" text-anchor="middle">Clone with write access</text>
  <text class="label-step" x="566" y="334" text-anchor="middle">Mount addons rw</text>
  <text class="label-step" x="566" y="351" text-anchor="middle">Open debugpy :5678</text>

  <line class="conn" x1="114" y1="356" x2="114" y2="396" marker-end="url(#arrow)"/>
  <line class="conn" x1="340" y1="356" x2="340" y2="396" marker-end="url(#arrow)"/>
  <line class="conn" x1="566" y1="356" x2="566" y2="396" marker-end="url(#arrow)"/>

  <!-- ── Outcome boxes ────────────────── -->
  <rect class="box-out1" x="18"  y="396" width="192" height="52" rx="8"/>
  <text class="label-out label-out1" x="114" y="416" text-anchor="middle">Production up</text>
  <text class="label-outsub label-outsub1" x="114" y="434" text-anchor="middle">Nginx + SSL ready</text>

  <rect class="box-out2" x="244" y="396" width="192" height="52" rx="8"/>
  <text class="label-out label-out2" x="340" y="416" text-anchor="middle">Demo on localhost</text>
  <text class="label-outsub label-outsub2" x="340" y="434" text-anchor="middle">http://localhost:8069</text>

  <rect class="box-out3" x="470" y="396" width="192" height="52" rx="8"/>
  <text class="label-out label-out3" x="566" y="416" text-anchor="middle">Dev env ready</text>
  <text class="label-outsub label-outsub3" x="566" y="434" text-anchor="middle">PyCharm + live addons</text>

  <!-- Developer extras arrow + box -->
  <line class="conn" x1="566" y1="448" x2="566" y2="484" marker-end="url(#arrow)"/>

  <rect class="box-step3" x="470" y="484" width="192" height="74" rx="6"/>
  <text class="label-step" x="566" y="502" text-anchor="middle">workers=0 (debuggable)</text>
  <text class="label-step" x="566" y="519" text-anchor="middle">log_level=debug</text>
  <text class="label-step" x="566" y="536" text-anchor="middle">dev_mode=reload,xml</text>
  <text class="label-step" x="566" y="553" text-anchor="middle">PyCharm instructions</text>
</svg>
