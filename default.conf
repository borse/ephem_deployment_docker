# ── Rate Limiting ──────────────────────────────
limit_req_zone $binary_remote_addr zone=odoo_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ── Upstreams ─────────────────────────────────
upstream odoo-backend {
    server odoo:8069;
}
upstream odoo-chat {
    server odoo:8072;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── HTTP (redirects to HTTPS after SSL is set up) ──
server {
    listen 80;
    server_name _;

    # Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt;
    }

    # Before SSL: serve Odoo directly on port 80
    # After SSL: uncomment the return 301 and remove the locations below
    # return 301 https://$host$request_uri;

    # Proxy headers
    proxy_set_header X-Forwarded-Host  $host;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP         $remote_addr;

    client_max_body_size 100M;

    location /websocket {
        proxy_pass http://odoo-chat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP         $remote_addr;
    }

    location / {
        proxy_redirect off;
        proxy_pass http://odoo-backend;
        limit_req zone=odoo_limit burst=20 nodelay;
    }

    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://odoo-backend;
    }
}

