[options]
; Database credentials come from environment variables
; in docker-compose.yml (HOST, PORT, USER, PASSWORD).
; Do NOT set db_host, db_port, db_user, db_password here.

; Master password for database management page
; Change this in .env (ODOO_ADMIN_PASSWORD), then run:
;   ./scripts/sync-config.sh
admin_passwd = ODOO_ADMIN_PASSWORD_PLACEHOLDER

; Addons
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons

; Proxy (NGINX handles SSL)
proxy_mode = True

; Workers
workers = 4
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200

; Ports
xmlrpc_port = 8069
gevent_port = 8072

; Logging
log_level = info

; Database management
list_db = True